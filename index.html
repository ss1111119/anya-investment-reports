<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anya 每日投資分析報告</title>
  <meta name="description" content="Anya AI 每日自動生成的台美股投資分析報告，包含宏觀指標、三大法人、板塊資金流向與 AI 深度分析。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="static/css/index.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">📊 Anya 投資報告</div>
    <div class="market-status">
      <span class="status-dot" id="market-dot"></span>
      <span id="market-label">—</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <div class="report-nav">
        <button class="nav-btn" id="report-prev-btn" onclick="navigateReport('prev')" title="切換到上一筆報告">← 上一筆</button>
        <button class="nav-btn nav-btn-primary" id="report-latest-btn" onclick="navigateReport('latest')" title="回到最新報告">最新</button>
        <button class="nav-btn" id="report-next-btn" onclick="navigateReport('next')" title="切換到下一筆報告">下一筆 →</button>
      </div>
      <select id="date-select" title="選擇報告日期"></select>
      <button class="tts-btn" id="tts-btn" onclick="toggleTTS()" title="朗讀 AI 分析">🔊 朗讀</button>
    </div>
  </div>
</header>

<nav class="anchor-nav">
  <div class="anchor-nav-inner">
    <a href="#sec-hero">概覽</a>
    <a href="#sec-macro">美股指標</a>
    <a href="#sec-commodity">商品走勢</a>
    <a href="#sec-sentiment">市場情緒</a>
    <a href="#sec-tw">台股盤前</a>
    <a href="#sec-history">歷史走勢</a>
    <a href="#sec-yield-oil">美債油價</a>
    <a href="#sec-inst">三大法人</a>
    <a href="#sec-sector">板塊流向</a>
    <a href="#sec-chart-orchestration">圖表編排</a>
    <a href="#sec-kol">KOL 情緒</a>
    <a href="#sec-ai">AI 分析</a>
    <div class="anchor-nav-spacer"></div>
    <div class="anchor-nav-tools">
      <button type="button" class="nav-btn nav-btn-ghost" onclick="expandAllSections()" title="展開所有可折疊章節">全部展開</button>
      <button type="button" class="nav-btn nav-btn-ghost" onclick="collapseAllSections()" title="收合所有可折疊章節">全部收合</button>
    </div>
  </div>
</nav>

<main>
  <div id="app"><div class="loader">載入報告中<span class="spinner"></span></div></div>
</main>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer>
  由 <a href="https://github.com/ss1111119/anya-investment-reports" target="_blank">Anya AI Bot</a> 自動生成 ·
  資料僅供參考，不構成投資建議
</footer>
  <script src="static/js/index.js"></script>
</body>
</html>
