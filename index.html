<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: 'Noto Sans TC', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 20px; padding: 48px; box-shadow: 0 4px 32px rgba(0,0,0,0.1); text-align: center; max-width: 480px; }

    p { color: #64748b; line-height: 1.7; }
    .badge { display: inline-block; background: #e8eaf6; color: #3f51b5; border-radius: 999px; padding: 6px 18px; font-weight: 700; font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:48px;margin-bottom:16px;">🤖</div>
    <h1>Anya 每日市場分析</h1>
    <p>每日盤前晨報自動生成中，請稍候。<br/>報告將於每個交易日早上 08:35 更新。</p>
    <div class="badge">📅 系統啟動中...</div>
  </div>
